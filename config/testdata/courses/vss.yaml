    description: Blatt 0, Verteilte Softwaresysteme, SS 26
    per: student
    startercode:
      url: git@gitlab.lrz.de:vss/startercode/startercodeB0.git
      fromBranch: template
      toBranch: main
    branches:
      - name: main
        default: true
      - name: startercode
        protect: true
    clone:
      localpath: /tmp/glabs/vss/26ss/blatt0
      branch: develop

# glabs report vss blatt1 --html -o vss-blatt1.html
  blatt1:
    assignmentpath: blatt-1
    description: Blatt 1, Verteilte Softwaresysteme, SS 26
    per: group
    containerRegistry: true
    startercode:
      url: git@gitlab.lrz.de:vss/startercode/startercodeB1.git
      fromBranch: template
      toBranch: main
    branches:
      - name: main
        mergeOnly: true
        default: true
      - name: startercode
        protect: true
    issues:
      replicateFromStartercode: true
      issueNumbers: [1]
    mergeRequest:
      mergeMethod: semi_linear
      squashOption: never
      pipeline: true
      skippedPipelinesAreSuccessful: false
      allThreadsMustBeResolved: true
      statusChecksMustSucceed: true
    clone:
      localpath: /tmp/glabs/vss/26ss/blatt1
      branch: develop
    # accesslevel: guest
    release:
      mergeRequest:
        pipeline: true

  blatt2:
    assignmentpath: blatt-2
    description: Blatt 2, Verteilte Softwaresysteme, SS 26
    per: group
    containerRegistry: true
    startercode:
      url: git@gitlab.lrz.de:vss/startercode/startercodeB2.git
      fromBranch: template
      toBranch: main
    branches:
      - name: main
        mergeOnly: true
        default: true
      - name: startercode
        protect: true
    issues:
      replicateFromStartercode: true
      issueNumbers: [1]
    mergeRequest:
      mergeMethod: semi_linear
      squashOption: never
      pipeline: true
      skippedPipelinesAreSuccessful: false
      statusChecksMustSucceed: true
      allThreadsMustBeResolved: true
      approvals:
        settings:
          preventApprovalByMergeRequestCreator: true
          preventApprovalsByUsersWhoAddCommits: false
          preventEditingApprovalRulesInMergeRequests: true
          requireUserReauthenticationToApprove: false
          whenCommitAdded: removeAllApprovals
        rules:
          - name: review
            branches:
              - main
              - startercode
            requiredApprovals: 1
            multiMemberGroupsOnly: true
          - name: submission
            branch: startercode
            usernames:
              - obcode
            requiredApprovals: 1
    clone:
      localpath: /tmp/glabs/vss/26ss/blatt2
      branch: main
    # accesslevel: guest
    release:
      mergeRequest:
        pipeline: true
      dockerImages:
        - service/customer
        - service/order
        - service/payment
        - service/shipment
        - service/stock
        - service/supplier

